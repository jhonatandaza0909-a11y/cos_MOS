        const cur = seleccionado.audio.currentTime; const dur = seleccionado.audio.duration;
        document.getElementById('audio-time').innerText = `${fmtTime(cur)} / ${fmtTime(dur)}`;
        document.getElementById('progress-bar').style.width = (dur ? (cur / dur) * 100 : 0) + "%";
        document.getElementById('progress-bar').style.backgroundColor = seleccionado.col;
    } else { document.getElementById('audio-time').innerText = "00:00 / 00:00"; document.getElementById('progress-bar').style.width = "0%"; }
}

function toggleLetras() { mostrandoLetras = !mostrandoLetras; panelLyrics.classList.toggle('active', mostrandoLetras); }

function crearCometaAmor() {
    const colores = ['#ff2a00', '#ff00ff']; const color = colores[Math.floor(Math.random() * colores.length)];
    const entradaX = (Math.random() - 0.5) * 5500; const entradaY = (Math.random() > 0.5 ? -3000 : 3000);
    cometasAmor.push({ x: entradaX, y: entradaY, vx: (entradaX > 0 ? -1 : 1) * (5 + Math.random() * 3), vy: (entradaY > 0 ? -1 : 1) * (5 + Math.random() * 3), color: color, trail: [], life: 0, maxLife: 900, active: true });
}

function init() {
    window.addEventListener('resize', resize); resize();
    for(let i=0; i<800; i++) estrellas.push({ x: Math.random()*6000-3000, y: Math.random()*6000-3000, size: Math.random()*1.5, b: Math.random() });
    setInterval(crearCometaAmor, 2200); setupInteractions(); draw(); 
}

function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }

function setupInteractions() {
    canvas.addEventListener('mousedown', e => {
        isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
        let hit = false;
        planetas.forEach(p => { const d = Math.hypot(e.clientX - p.scrX, e.clientY - p.scrY); if (d < p.r * zoomAct + 25) { seleccionarPlaneta(p); hit = true; } });
        if(!hit && !e.target.closest('#panel-datos')) cerrarPanel();
    });
    window.addEventListener('mousemove', e => { if (isDragging) { rotY += (e.clientX - lastMouseX) * 0.005; rotX = Math.max(0.1, Math.min(1.5, rotX + (e.clientY - lastMouseY) * 0.005)); lastMouseX = e.clientX; lastMouseY = e.clientY; } });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('wheel', e => zoomObj = Math.max(0.03, Math.min(6, zoomObj - e.deltaY * 0.001)), {passive: true});
}

function seleccionarPlaneta(p) {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    planetas.forEach(pl => { pl.audio.pause(); pl.audio.currentTime = 0; });
    if (audioCtx && !sourceNodes.has(p.nom)) { const source = audioCtx.createMediaElementSource(p.audio); source.connect(analyser); sourceNodes.set(p.nom, source); }
    p.audio.play().catch(() => {});
    seleccionado = p; zoomObj = p.d === 0 ? 0.35 : 1.5; 
    document.getElementById('track-playing').innerText = p.src.split('.')[0].substring(0, 15) + "..."; 
    document.getElementById('track-name').innerText = p.nom;
    document.getElementById('p-nombre').innerText = p.nom;
    document.getElementById('p-frase-cancion').innerText = p.frase;
    document.getElementById('p-descripcion').innerText = p.desc;
    document.getElementById('val-tipo').innerText = p.tipo;
    document.getElementById('val-temp').innerText = p.temp;
    document.getElementById('val-r').innerText = p.rText;
    document.getElementById('val-pop').innerText = p.lunas;
    const canHaveLyrics = (p.nom === "ASTRO" || p.nom === "FLOR" || p.nom === "TATAN" || p.nom === "Titán" || p.nom === "LIAM" || p.nom === "Gris Nebular" || p.nom === "LILI" || p.nom === "Cian");
    document.getElementById('btn-ver-letras').style.display = canHaveLyrics ? "block" : "none";
    document.getElementById('btn-ver-letras').style.backgroundColor = p.col;
    document.getElementById('current-lyric').style.textShadow = `0 0 20px ${p.col}`;
    panel.classList.add('active');
}

function cerrarPanel() { panel.classList.remove('active'); panelLyrics.classList.remove('active'); mostrandoLetras = false; planetas.forEach(pl => pl.audio.pause()); document.getElementById('track-playing').innerText = "NINGUNA"; document.getElementById('track-name').innerText = "SISTEMA COMPLETO"; seleccionado = null; zoomObj = 0.5; }

function draw() {
    ctx.fillStyle = '#000008'; ctx.fillRect(0, 0, width, height);
    time += 0.012; zoomAct += (zoomObj - zoomAct) * 0.06;
    if (analyser && seleccionado) { analyser.getByteFrequencyData(dataArray); let sum = 0; for(let i = 0; i < 15; i++) sum += dataArray[i]; rhythmPulse = (sum / 15) / 255; } else { rhythmPulse = 0; }
    if (mostrandoLetras && seleccionado) {
        let letraSet = null;
        if(seleccionado.nom === "ASTRO") letraSet = letrasAstro;
        if(seleccionado.nom === "FLOR") letraSet = letrasFlor;
        if(seleccionado.nom === "TATAN" || seleccionado.nom === "Titán") letraSet = letrasTatan;
        if(seleccionado.nom === "LIAM") letraSet = letrasLiam;
        if(seleccionado.nom === "Gris Nebular") letraSet = letrasGris;
        if(seleccionado.nom === "LILI") letraSet = letrasLili; 
        if(letraSet) {
            const cTime = seleccionado.audio.currentTime; const fraseActual = letraSet.findLast(l => cTime >= l.t);
            if(fraseActual) { const el = document.getElementById('current-lyric'); el.innerText = fraseActual.txt; el.style.transform = `scale(${1 + rhythmPulse * 0.35})`; }
        }
    }
    updateHUD();
    let targetX = 0, targetY = 0;
    if(seleccionado) { const ang = (time * seleccionado.v * 25) + planetas.indexOf(seleccionado)*2 + rotY; targetX = Math.cos(ang) * seleccionado.d; targetY = Math.sin(ang) * seleccionado.d * Math.sin(rotX); }
    camX += (targetX - camX) * 0.08; camY += (targetY - camY) * 0.08;
    ctx.save();
    ctx.translate(width/2, height/2); ctx.scale(zoomAct, zoomAct); ctx.translate(-camX, -camY);
    estrellas.forEach(e => { ctx.fillStyle = `rgba(255, 255, 255, ${0.2 + Math.sin(time + e.b*15) * 0.5})`; ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill(); });
    const posPlanetas = planetas.map((p, i) => { const ang = (time * p.v * 25) + i*2 + rotY; return { x: Math.cos(ang) * p.d, y: Math.sin(ang) * p.d, r: p.r, col: p.col, isGuardian: p.isGuardian }; });
    cometasAmor.forEach((c, idx) => {
        if (!c.active) return;
        posPlanetas.forEach(p => { const dist = Math.hypot(c.x - p.x, c.y - p.y); let fuerzaG = p.isGuardian ? 0.8 : 0.15; let radioAccion = p.isGuardian ? 400 : p.r * 5; if(dist < radioAccion) { c.vx += (p.x - c.x) / dist * fuerzaG; c.vy += (p.y - c.y) / dist * fuerzaG; } if (dist < p.r + 15) { c.active = false; explosiones.push({x: c.x, y: c.y * Math.sin(rotX), color: c.color, life: 1.0}); } });
        c.x += c.vx; c.y += c.vy; const rY = c.y * Math.sin(rotX); c.trail.push({x: c.x, y: rY}); if (c.trail.length > 30) c.trail.shift();
        c.trail.forEach((t, i) => { ctx.fillStyle = c.color + Math.floor((i/30)*255).toString(16).padStart(2, '0'); ctx.beginPath(); ctx.arc(t.x, t.y, (i/30)*4, 0, Math.PI*2); ctx.fill(); });
        if(c.active) { ctx.shadowBlur = 10; ctx.shadowColor = c.color; ctx.fillStyle = c.color; ctx.font = 'bold 18px "Courier New"'; ctx.textAlign = "center"; ctx.fillText("TE AMO", c.x, rY - 20); ctx.shadowBlur = 0; }
        if(c.life++ > c.maxLife || !c.active) cometasAmor.splice(idx, 1);
    });
    explosiones.forEach((exp, i) => { ctx.fillStyle = exp.color; ctx.beginPath(); ctx.arc(exp.x, exp.y, 50 * (1 - exp.life), 0, Math.PI*2); ctx.fill(); exp.life -= 0.05; if(exp.life <= 0) explosiones.splice(i, 1); });

    planetas.forEach((p, i) => { 
        if(i !== 0) { 
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)'; 
            ctx.lineWidth = 1.8; 
            ctx.beginPath(); 
            ctx.ellipse(0,0, p.d, p.d*Math.sin(rotX), 0,0, Math.PI*2); 
            ctx.stroke(); 
        } 
    });

    const renderPlaneta = (p, i) => {
        const ang = (time * p.v * 25) + i*2 + rotY;
        const px = Math.cos(ang) * p.d; const py = Math.sin(ang) * p.d * Math.sin(rotX);
        
        const drawLunas = (atBack) => {
            for(let l=0; l<p.lunas; l++){
                const lang = (time * 0.7) + (l * (Math.PI * 2 / p.lunas));
                const lY_rel = Math.sin(lang); 
                if ((atBack && lY_rel < 0) || (!atBack && lY_rel >= 0)) {
                    const lx = px + Math.cos(lang) * (p.r*2.8);
                    const ly = py + lY_rel * (p.r*2.8) * Math.sin(rotX);
                    ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
                    ctx.beginPath(); ctx.arc(lx, ly, 2.5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                }
            }
        };

        const drawAnillos = (atBack) => {
            if(!p.rings) return;
            for(let r=0; r<3; r++) {
                ctx.save(); ctx.translate(px, py);
                ctx.strokeStyle = `rgba(0, 204, 255, ${0.4 - r*0.1})`; ctx.lineWidth = 4 - r;
                ctx.beginPath();
                const start = atBack ? Math.PI : 0;
                const end = atBack ? Math.PI * 2 : Math.PI;
                ctx.ellipse(0, 0, p.r * (1.8 + r*0.2), p.r * (0.6 + r*0.1) * Math.sin(rotX), 0, start, end);
                ctx.stroke();
                ctx.restore();
            }
        };

        drawLunas(true); drawAnillos(true);

        let auraMult = (p.nom === "LILI") ? 3 : 1.5; let auraAlpha = (p.nom === "LILI") ? 'bb' : '44';
        const auraGrad = ctx.createRadialGradient(px, py, p.r, px, py, p.r * auraMult); auraGrad.addColorStop(0, p.col + auraAlpha); auraGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = auraGrad; ctx.beginPath(); ctx.arc(px, py, p.r * auraMult, 0, Math.PI*2); ctx.fill();
        const pGrad = ctx.createRadialGradient(px - p.r*0.3, py - p.r*0.3, p.r*0.1, px, py, p.r); pGrad.addColorStop(0, '#fff'); pGrad.addColorStop(0.2, p.col); pGrad.addColorStop(1, '#000');
        ctx.fillStyle = pGrad; ctx.shadowBlur = (p.nom === "LILI") ? 50 : 15; ctx.shadowColor = p.col; ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        
        if (p === seleccionado) {
            const auraLatido = p.r * (2 + rhythmPulse * 4); ctx.beginPath(); ctx.arc(px, py, auraLatido, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 20, 147, ${0.1 + rhythmPulse * 0.3})`; ctx.fill();
            ctx.strokeStyle = `rgba(0, 255, 255, ${0.5 + rhythmPulse * 0.5})`; ctx.lineWidth = 2 + rhythmPulse * 3;
            ctx.beginPath(); ctx.ellipse(px, py, p.r * 1.5 + rhythmPulse * 40, (p.r * 0.5 + rhythmPulse * 15) * Math.sin(rotX), 0, 0, Math.PI*2); ctx.stroke();
        }

        if(p.hasSmallRing) { ctx.save(); ctx.translate(px, py); ctx.rotate(time * 2); ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff'; ctx.beginPath(); ctx.ellipse(0, 0, p.r * 1.6, p.r * 0.4 * Math.sin(rotX), 0, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
        
        drawAnillos(false); drawLunas(false);
        p.scrX = width/2 + (px - camX) * zoomAct; p.scrY = height/2 + (py - camY) * zoomAct;
    };

    planetas.forEach((p, i) => { if (p.nom === 'FLOR') return; const ang = (time * p.v * 25) + i*2 + rotY; const py = Math.sin(ang) * p.d * Math.sin(rotX); if (py < 0) renderPlaneta(p, i); });

    const pulsoSol = 72 + Math.sin(time * 3) * 5; ctx.save();
    const solGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, pulsoSol * 4); solGlow.addColorStop(0, 'rgba(255, 100, 0, 0.5)'); solGlow.addColorStop(0.6, 'rgba(255, 30, 0, 0.1)'); solGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = solGlow; ctx.beginPath(); ctx.arc(0, 0, pulsoSol * 4, 0, Math.PI*2); ctx.fill();
    for (let i = 0; i < 5; i++) { const offset = (time * (1 + i * 0.2)) % 1; const radius = pulsoSol * (1 - offset); const alpha = offset * 0.6; ctx.strokeStyle = `rgba(255, 60, 0, ${alpha})`; ctx.lineWidth = 15; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke(); }
    const solGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, pulsoSol); solGrad.addColorStop(0, '#ffffff'); solGrad.addColorStop(0.3, '#ffcc00'); solGrad.addColorStop(0.7, '#ff5500'); solGrad.addColorStop(1, '#992200'); 
    ctx.shadowBlur = 80; ctx.shadowColor = '#ff6600'; ctx.fillStyle = solGrad; ctx.beginPath(); ctx.arc(0, 0, pulsoSol, 0, Math.PI*2); ctx.fill(); ctx.restore();
    const pSol = planetas.find(p => p.nom === 'FLOR'); pSol.scrX = width/2 + (0 - camX) * zoomAct; pSol.scrY = height/2 + (0 - camY) * zoomAct;

    planetas.forEach((p, i) => { if (p.nom === 'FLOR') return; const ang = (time * p.v * 25) + i*2 + rotY; const py = Math.sin(ang) * p.d * Math.sin(rotX); if (py >= 0) renderPlaneta(p, i); });

    ctx.restore(); requestAnimationFrame(draw);
}
init();
</script>
</body>
